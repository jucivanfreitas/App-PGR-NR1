name: Release Promotion

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: Semantic version tag to promote
        required: true
        type: string
      release_kind:
        description: Release track
        required: true
        default: rc
        type: choice
        options: [rc, production]

permissions:
  contents: write

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run typecheck
      - run: npm run test
      - run: npm run build
      - name: Release policy reminder
        run: echo "Production deploys require human approval and environment-specific secrets."
